<svg width="640" height="200" viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="cux">
  <title>cux</title>
  <defs>
    <linearGradient id="wordA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="wordB" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Icon block at left, scaled from the 256x256 logo to fit a 200x200
       cell with padding so the wordmark feels balanced. -->
  <g transform="translate(20, 20) scale(0.625)">
    <rect width="256" height="256" rx="56" fill="#0B1220"/>
    <g fill="url(#wordA)" stroke="url(#wordA)" stroke-width="20"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M 56 112 Q 128 40 196 96" fill="none"/>
      <polygon points="196,68 224,108 168,118"/>
    </g>
    <g fill="url(#wordB)" stroke="url(#wordB)" stroke-width="20"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M 200 144 Q 128 216 60 160" fill="none"/>
      <polygon points="60,188 32,148 88,138"/>
    </g>
  </g>

  <!-- Wordmark next to the icon. System monospace stack so the
       wordmark looks at home in a CLI-tool README. -->
  <text x="240" y="138"
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace"
        font-size="148" font-weight="700" letter-spacing="-4"
        fill="#E2E8F0">cux</text>
</svg>
