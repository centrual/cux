<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="cux logo">
  <title>cux</title>
  <defs>
    <linearGradient id="cuxA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="cuxB" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background. Dark navy reads at favicon size and on
       both light and dark README themes. -->
  <rect width="256" height="256" rx="56" fill="#0B1220"/>

  <!-- The mark is two arrow-arcs orbiting a shared centre, clearly
       separated vertically so they read as distinct flows rather than
       collapsing into an oval. Each arrow is a single filled shape
       (path with stroke + fill on the arrowhead triangle) so the
       gradient continues seamlessly into the head. -->

  <!-- Top arrow: sweeps left-to-right across the upper half, head at right. -->
  <g fill="url(#cuxA)" stroke="url(#cuxA)" stroke-width="20"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M 56 112 Q 128 40 196 96" fill="none"/>
    <polygon points="196,68 224,108 168,118"/>
  </g>

  <!-- Bottom arrow: sweeps right-to-left across the lower half, head at left. -->
  <g fill="url(#cuxB)" stroke="url(#cuxB)" stroke-width="20"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M 200 144 Q 128 216 60 160" fill="none"/>
    <polygon points="60,188 32,148 88,138"/>
  </g>
</svg>
