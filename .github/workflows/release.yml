name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, suffix: "" }
          - { goos: linux,   goarch: arm64, suffix: "" }
          - { goos: darwin,  goarch: amd64, suffix: "" }
          - { goos: darwin,  goarch: arm64, suffix: "" }
          - { goos: windows, goarch: amd64, suffix: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          # Strip the leading "v" from the tag (v0.2.6 → 0.2.6) so the
          # binary's embedded version matches what the updater reads from
          # the GitHub release tag.
          VERSION="${GITHUB_REF_NAME#v}"
          out="cux-${GOOS}-${GOARCH}${{ matrix.suffix }}"
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "$out" ./cmd/cux
          sha256sum "$out" > "$out.sha256"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cux-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            cux-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
            cux-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}.sha256
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
